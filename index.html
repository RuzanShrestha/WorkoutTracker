<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workout Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --pink: #fce4ec; --dark-pink: #f8bbd0; --black: #000000; --gray: #444; --card-bg: #0a0a0a; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--black);
      color: var(--pink);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 500px; margin: 0 auto; }
    header { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    h1 { font-size: 26px; font-weight: 800; text-transform: uppercase; color: var(--pink); }
    .subtitle { color: var(--gray); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

    .top-bar { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
    select {
      appearance: none; background: var(--black); color: var(--pink);
      border: 1px solid var(--gray); padding: 14px; border-radius: 12px; font-size: 16px; outline: none;
    }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      background: var(--pink); color: var(--black); border: none; padding: 12px;
      border-radius: 10px; cursor: pointer; font-weight: 700; text-transform: uppercase;
      font-size: 10px; letter-spacing: 0.5px;
    }

    .clear-all-btn { background: transparent; color: var(--gray); border: 1px solid var(--gray); }

    .exercise-list { display: flex; flex-direction: column; gap: 15px; }
    .exercise-item {
      background: var(--card-bg); border: 1px solid #1a1a1a;
      border-radius: 16px; padding: 18px; transition: 0.3s;
    }

    .choice-container { display: flex; flex-direction: column; gap: 10px; }
    .choice-label { font-size: 12px; color: var(--gray); font-weight: 800; text-transform: uppercase; }
    .choice-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .choice-btn {
      background: #1a1a1a; color: var(--pink); border: 1px solid var(--gray);
      padding: 8px 12px; border-radius: 8px; font-size: 11px; flex: 1; min-width: 100px;
    }
    .choice-btn.selected { background: var(--pink); color: var(--black); border-color: var(--pink); }

    .exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .exercise-name { font-size: 16px; font-weight: 600; color: #fff; }
    
    .done-label {
      font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 6px;
      background: #1a1a1a; padding: 4px 10px; border-radius: 20px;
    }
    input[type="checkbox"] { accent-color: var(--pink); width: 16px; height: 16px; }

    .pr-input {
      background: transparent; border: none; border-bottom: 1px solid #222;
      color: var(--pink); padding: 8px 0; font-size: 14px; outline: none; width: 100%;
    }

    .checked { border-color: var(--dark-pink); opacity: 0.6; }
    .checked .exercise-name { text-decoration: line-through; color: var(--gray); }

    .footer-note { margin: 40px 0; font-size: 9px; color: var(--gray); text-align: center; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Workout Tracker</h1>
      <p class="subtitle">Custom Plan / Mobile</p>
    </header>

    <div class="top-bar">
      <select id="daySelect">
        <option value="pull">PULL DAY</option>
        <option value="push">PUSH DAY</option>
        <option value="leg">LEG DAY</option>
      </select>
      <div class="btn-group">
        <button id="resetDayBtn">Reset Day</button>
        <button class="clear-all-btn" id="clearAllBtn">Clear All</button>
      </div>
    </div>

    <div id="exerciseList" class="exercise-list"></div>
    <p class="footer-note">Local Storage Active</p>
  </div>

  <script>
    // Data based on your PDF plan [cite: 2, 9-18, 27-30, 35, 41-54, 122-124, 128-147]
    const workoutPlan = {
      pull: [
        { name: "Dead Hang", type: "standard" },
        { name: "Hyper Extension", type: "standard" },
        { name: "Lats", type: "choice", options: ["Lat Pullover", "Lat Pulldown"] },
        { name: "Upper Back", type: "choice", options: ["Seated Cable Rows", "T-Bar Row"] },
        { name: "Biceps", type: "choice", options: ["Preacher Curls", "Normal Curls", "Spider Curls"] },
        { name: "Core", type: "standard" }
      ],
      push: [
        { name: "Dumbbell Bench Press", type: "standard" },
        { name: "Shoulder Press", type: "standard" },
        { name: "Lateral Raises", type: "standard" },
        { name: "Rear Delt Fly", type: "standard" },
        { name: "Triceps", type: "choice", options: ["Tricep Pushdown", "Skull Crushers"] },
        { name: "Core", type: "standard" }
      ],
      leg: [
        { name: "Compound Lift", type: "choice", options: ["Leg Press", "Squats"] },
        { name: "Knee Extension", type: "standard" },
        { name: "Hip Thrusts", type: "standard" },
        { name: "Hamstring Curls", type: "standard" },
        { name: "Calf Raises", type: "standard" },
        { name: "Core", type: "standard" }
      ]
    };

    const daySelect = document.getElementById("daySelect");
    const exerciseList = document.getElementById("exerciseList");
    const storageKey = (day) => `workoutTracker_v2_${day}`;

    function loadData(day) {
      const saved = localStorage.getItem(storageKey(day));
      return saved ? JSON.parse(saved) : {};
    }

    function saveData(day, data) {
      localStorage.setItem(storageKey(day), JSON.stringify(data));
    }

    function render() {
      const day = daySelect.value;
      const dayData = loadData(day);
      exerciseList.innerHTML = "";

      workoutPlan[day].forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "exercise-item";
        
        // Handle "Choice" exercises (Either/Or) [cite: 11, 16, 26, 128]
        if (item.type === "choice") {
          const selected = dayData[`choice_${index}`] || null;
          div.innerHTML = `
            <div class="choice-container">
              <span class="choice-label">${item.name} (Pick One)</span>
              <div class="choice-buttons">
                ${item.options.map(opt => `
                  <button class="choice-btn ${selected === opt ? 'selected' : ''}" 
                          onclick="makeChoice('${day}', ${index}, '${opt}')">${opt}</button>
                `).join('')}
              </div>
            </div>
          `;
          
          if (selected) {
            div.innerHTML += renderExerciseRow(selected, dayData[selected] || {});
          }
        } else {
          div.innerHTML = renderExerciseRow(item.name, dayData[item.name] || {});
        }

        if (dayData[item.name]?.checked || (item.type === 'choice' && dayData[dayData[`choice_${index}`]]?.checked)) {
          div.classList.add("checked");
        }
        
        exerciseList.appendChild(div);
      });
    }

    function renderExerciseRow(name, data) {
      return `
        <div style="margin-top: 15px; border-top: 1px solid #1a1a1a; padding-top: 15px;">
          <div class="exercise-header">
            <span class="exercise-name">${name}</span>
            <label class="done-label">
              DONE <input type="checkbox" ${data.checked ? 'checked' : ''} 
                    onchange="toggleCheck('${name}', this.checked)">
            </label>
          </div>
          <input type="text" class="pr-input" placeholder="Set PR (e.g. 50kg x 10)" 
                 value="${data.pr || ''}" onblur="updatePR('${name}', this.value)">
        </div>
      `;
    }

    window.makeChoice = (day, index, val) => {
      const data = loadData(day);
      data[`choice_${index}`] = val;
      saveData(day, data);
      render();
    };

    window.toggleCheck = (name, val) => {
      const day = daySelect.value;
      const data = loadData(day);
      if (!data[name]) data[name] = {};
      data[name].checked = val;
      saveData(day, data);
      render();
    };

    window.updatePR = (name, val) => {
      const day = daySelect.value;
      const data = loadData(day);
      if (!data[name]) data[name] = {};
      data[name].pr = val;
      saveData(day, data);
    };

    document.getElementById("resetDayBtn").onclick = () => {
      const day = daySelect.value;
      const data = loadData(day);
      Object.keys(data).forEach(k => { if(data[k].checked !== undefined) data[k].checked = false; });
      saveData(day, data);
      render();
    };

    document.getElementById("clearAllBtn").onclick = () => {
      if(confirm("Erase all progress and PRs?")) {
        Object.keys(workoutPlan).forEach(d => localStorage.removeItem(storageKey(d)));
        render();
      }
    };

    daySelect.onchange = render;
    render();
  </script>
</body>
</html>
